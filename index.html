<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bianca Morgado | Portfolio</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
    
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-offwhite text-darkgray font-sans antialiased overflow-x-hidden selection:bg-gray-300 selection:text-black">
    
    <header class="fixed top-0 w-full z-50 bg-offwhite/80 backdrop-blur-md border-b border-gray-200/50 transition-all duration-300" id="header">
        <div class="max-w-6xl mx-auto px-6 h-20 flex items-center justify-between">
            <a href="#" class="text-lg tracking-wide font-medium">Bianca Morgado</a>
            <nav class="hidden md:flex gap-8 text-sm font-medium tracking-wide">
                <a href="#sobre" class="hover:text-gray-500 transition-colors">Sobre</a>
                <a href="#softwares" class="hover:text-gray-500 transition-colors">Skills</a>
                <a href="#projetos" class="hover:text-gray-500 transition-colors">Projetos</a>
                <a href="#contato" class="hover:text-gray-500 transition-colors">Contato</a>
            </nav>
        </div>
    </header>

    <main class="pt-32">
        <section id="sobre" class="max-w-6xl mx-auto px-6 py-16 md:py-32">
            <div class="grid grid-cols-1 md:grid-cols-12 gap-12 lg:gap-20 items-center">
                <div class="md:col-span-5 img-reveal">
                    <div class="aspect-[4/5] overflow-hidden rounded-2xl bg-gray-200">
                        <img src="perfil.png" alt="Bianca Morgado" class="w-full h-full object-cover" onerror="this.src='https://images.unsplash.com/photo-1534528741775-53994a69daeb?auto=format&fit=crop&q=80'">
                    </div>
                </div>
                <div class="md:col-span-7 space-y-8 fade-up">
                    <h1 class="text-4xl md:text-5xl font-light tracking-tight">Sobre Mim</h1>
                    <div id="about-text" class="text-lg leading-relaxed text-gray-600 space-y-6 font-light">
                    </div>
                    <div class="pt-4">
                        <a href="Curriculo Bianca Morgado.pdf" download class="inline-flex items-center gap-2 px-6 py-3 bg-darkgray text-offwhite rounded-full hover:bg-gray-800 transition-all duration-300 group shadow-lg shadow-gray-200">
                            <span>Veja meu currículo</span>
                            <i data-lucide="arrow-down-to-line" class="w-4 h-4 group-hover:translate-y-1 transition-transform"></i>
                        </a>
                    </div>
                </div>
            </div>
        </section>

        <section id="softwares" class="bg-gray-50 py-24 md:py-32 border-y border-gray-200/50">
            <div class="max-w-6xl mx-auto px-6">
                <h2 class="text-3xl font-light mb-16 text-center fade-up">Softwares & Skills</h2>
                <div id="skills-container" class="grid grid-cols-2 md:grid-cols-4 gap-8 lg:gap-12">
                </div>
            </div>
        </section>

        <section id="projetos" class="max-w-6xl mx-auto px-6 py-24 md:py-32">
            <h2 class="text-3xl font-light mb-16 fade-up">Projetos Selecionados</h2>
            <div id="projects-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
            </div>
        </section>

        <section id="contato" class="max-w-4xl mx-auto px-6 py-24 md:py-40 text-center">
            <div class="fade-up space-y-10">
                <h2 class="text-4xl md:text-5xl font-light tracking-tight">Gostou do meu trabalho?<br>Entre em contato!</h2>
                <div class="flex flex-col items-center gap-6">
                    <a id="whatsapp-link" href="#" target="_blank" class="inline-flex items-center gap-3 px-8 py-4 bg-darkgray text-offwhite rounded-full hover:bg-gray-800 transition-all duration-300 shadow-xl shadow-gray-200 group text-lg">
                        <i data-lucide="message-circle" class="w-5 h-5"></i>
                        <span>Entrar em contato via WhatsApp</span>
                    </a>
                    <div class="space-y-2">
                        <p class="text-gray-500 font-light">ou se preferir, mande um email</p>
                        <a id="email-link" href="#" class="text-xl md:text-2xl font-medium hover:text-gray-500 transition-colors inline-block relative after:content-[''] after:absolute after:w-full after:scale-x-0 after:h-px after:bottom-0 after:left-0 after:bg-current after:origin-bottom-right after:transition-transform after:duration-300 hover:after:scale-x-100 hover:after:origin-bottom-left">
                        </a>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <footer class="border-t border-gray-200/50 py-12">
        <div class="max-w-6xl mx-auto px-6 flex flex-col md:flex-row items-center justify-between gap-6">
            <p class="text-gray-400 text-sm tracking-wide">© 2026 Bianca Morgado. Todos os direitos reservados.</p>
            <div id="social-links" class="flex gap-6">
            </div>
        </div>
    </footer>

    <script type="module" src="app.js"></script>
</body>
</html>
